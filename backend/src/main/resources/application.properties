# ── Server ────────────────────────────────────────────────────────────────────
server.port=3001

# ── HTTPS (Assignment 4 Bronze) ───────────────────────────────────────────────
# To enable HTTPS: generate a keystore with:
#   keytool -genkeypair -alias pharmaconnect -keyalg RSA -keysize 2048 \
#           -storetype PKCS12 -keystore pharmaconnect.p12 -validity 365
# Then uncomment:
 server.ssl.enabled=true
 server.ssl.key-store=classpath:pharmaconnect.p12
 server.ssl.key-store-password=pharmaconnect
 server.ssl.key-store-type=PKCS12
 server.ssl.key-alias=pharmaconnect

# ── PostgreSQL ────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/pharmaconnect
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── MongoDB (Silver — chat) ───────────────────────────────────────────────────
spring.data.mongodb.uri=mongodb://localhost:27017/pharmaconnect_chat

# ── JWT ───────────────────────────────────────────────────────────────────────
app.jwt.secret=PharmaConnect2026SecretKeyForJWTTokenGenerationMustBe256BitsLong
# Session expiry: 30 min inactivity (Assignment 4 Bronze)
app.jwt.expiration=1800000
# Absolute max session: 24h
app.jwt.absolute-expiration=86400000

# ── CORS ─────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=*

# ── GraphQL ──────────────────────────────────────────────────────────────────
spring.graphql.websocket.path=/graphql-ws
spring.data.mongodb.auto-index-creation=false
spring.graphql.path=/graphql
spring.graphql.graphiql.enabled=true
